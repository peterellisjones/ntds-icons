name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Attach the committed, version-controlled artifacts — these are exactly
      # what ships on crates.io (`include_bytes!`). We do NOT regenerate-and-diff
      # in CI: font generation is only byte-deterministic per-platform (kurbo
      # float math), so a Linux rebuild differs from the macOS-committed bytes
      # while rendering identically. Freshness is guarded by the local
      # `cargo test --features build` drift test, run before tagging.
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            assets/ntds_icons.ttf
            assets/ntds_icons.woff2
          generate_release_notes: true
